version: '3.9'

services:
    user-service:
        build:
            context: ./user-service
        container_name: peerprep-user-service
        ports:
            - '3001:3001'
        env_file:
            - ./user-service/.env.docker
        restart: unless-stopped

    question-service:
        build:
            context: ./question-service
        container_name: peerprep-question-service
        ports:
            - '3002:3002'
        env_file:
            - ./question-service/.env.docker
        depends_on:
            - user-service
        restart: unless-stopped

    matching-service:
        build:
            context: ./matching-service
        container_name: peerprep-matching-service
        ports:
            - '3003:3003'
        env_file:
            - ./matching-service/.env.docker
        depends_on:
            - user-service
        restart: unless-stopped

    collaboration-service:
        build:
            context: ./collaboration-service
        container_name: peerprep-collaboration-service
        ports:
            - '3004:3004'
        env_file:
            - ./collaboration-service/.env.docker
        depends_on:
            - user-service
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend/peerprep-g15
        container_name: peerprep-frontend
        ports:
            - '5173:80'
        depends_on:
            - user-service
            - question-service
            - matching-service
            - collaboration-service
        restart: unless-stopped
