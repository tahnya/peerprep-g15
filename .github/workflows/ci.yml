name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    formatting:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm ci
            - run: npm run format:check

    backend-services:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service:
                    - user-service
                    - question-service
                    - collab-service
                    - matching-service

        defaults:
            run:
                working-directory: ${{ matrix.service }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: ${{ matrix.service }}/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm test

    frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm run lint
