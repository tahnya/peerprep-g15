name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    formatting:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm ci
            - run: npm run format:check

            - name: Add summary
              if: success()
              run: |
                  echo "## formatting summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- Formatting: passed" >> $GITHUB_STEP_SUMMARY

            - name: Add failure summary
              if: failure()
              run: |
                  echo "## formatting summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- Formatting: failed" >> $GITHUB_STEP_SUMMARY
                  echo "- Check the logs for details" >> $GITHUB_STEP_SUMMARY

    user-service:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: user-service

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: user-service/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm test

            - name: Add summary
              if: success()
              run: |
                  echo "## user-service summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- Build: passed" >> $GITHUB_STEP_SUMMARY
                  echo "- Tests: passed" >> $GITHUB_STEP_SUMMARY

            - name: Add failure summary
              if: failure()
              run: |
                  echo "## user-service summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- Build and/or tests: failed" >> $GITHUB_STEP_SUMMARY
                  echo "- Check the logs for details" >> $GITHUB_STEP_SUMMARY

